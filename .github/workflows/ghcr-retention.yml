name: GHCR Retention

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

concurrency:
  group: ghcr-publish
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      # Each multi-arch build produces 2 per-arch digest manifests + 1 manifest list.
      # Per-arch digests are always untagged but are referenced by the manifest list,
      # so they must not be deleted independently. Keep enough versions to cover
      # 5 releases * 3 versions each = 15 minimum.
      - name: Keep only latest GHCR package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 15
